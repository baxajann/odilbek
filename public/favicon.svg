<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="128" fill="#020817"/>
  
  <!-- Network path representing N -->
  <line x1="160" y1="360" x2="160" y2="152" stroke="#38bdf8" stroke-width="48" stroke-linecap="round"/>
  <line x1="160" y1="152" x2="352" y2="360" stroke="#38bdf8" stroke-width="48" stroke-linecap="round"/>
  <line x1="352" y1="360" x2="352" y2="152" stroke="#38bdf8" stroke-width="48" stroke-linecap="round"/>
  
  <!-- Connection nodes -->
  <circle cx="160" cy="152" r="32" fill="#fafafa"/>
  <circle cx="160" cy="360" r="32" fill="#fafafa"/>
  <circle cx="352" cy="152" r="32" fill="#fafafa"/>
  <circle cx="352" cy="360" r="32" fill="#fafafa"/>
</svg>